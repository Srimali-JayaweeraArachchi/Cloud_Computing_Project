name: CI/CD - Build and Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: CI - Validate Docker Compose file
        run: |
          cat > .env << EOF
          MONGO_URI_USERS=mongodb://localhost/users_db
          MONGO_URI_RESTAURANT=mongodb://localhost/restaurant_db
          MONGO_URI_ORDERS=mongodb://localhost/orders_db
          JWT_SECRET=dummy-for-validation
          RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
          EOF
          docker compose config
          echo "✅ Docker Compose config is valid"

      - name: CD - Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 1200s
          script: |
            echo "🚀 Deployment started at $(date)"
            df -h / | tail -1
            cd ~/food-ordering-app

            # Pull latest code
            git fetch origin main
            BEFORE=$(git rev-parse HEAD)
            git reset --hard origin/main
            AFTER=$(git rev-parse HEAD)
            echo "📌 Commit: $(git log --oneline -1)"

            # Recreate .env
            cat > .env << EOF
            MONGO_URI_USERS=${{ secrets.MONGO_URI_USERS }}
            MONGO_URI_RESTAURANT=${{ secrets.MONGO_URI_RESTAURANT }}
            MONGO_URI_ORDERS=${{ secrets.MONGO_URI_ORDERS }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            RABBITMQ_URL=${{ secrets.RABBITMQ_URL }}
            EOF

            # Check if service code changed (needs rebuild)
            # or only config files changed (just restart)
            CODE_CHANGED=$(git diff --name-only $BEFORE $AFTER | grep -E '^(user-service|restaurant-service|order-service|notification-service|frontend)/' | wc -l)

            if [ "$CODE_CHANGED" -gt "0" ]; then
              echo "🔨 Service code changed - full rebuild needed"
              docker compose down --remove-orphans
              docker container prune -f
              docker image prune -f
              docker compose build
              docker compose up -d
            else
              echo "⚡ Only config changed - quick restart (no rebuild)"
              docker compose restart api-gateway
            fi

            sleep 10
            docker compose ps
            echo "✅ Done at $(date)"
            echo "🌐 http://${{ secrets.EC2_HOST }}"