name: CI/CD - Build and Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: CI - Validate Docker Compose file
        run: |
          cat > .env << EOF
          MONGO_URI_USERS=mongodb://localhost/users_db
          MONGO_URI_RESTAURANT=mongodb://localhost/restaurant_db
          MONGO_URI_ORDERS=mongodb://localhost/orders_db
          JWT_SECRET=dummy-for-validation
          RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
          EOF
          docker compose config
          echo "✅ Docker Compose config is valid"

      - name: CD - Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 1200s
          script: |
            echo "🚀 Deployment started at $(date)"
            df -h / | tail -1

            cd ~/food-ordering-app

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main
            echo "📌 Commit: $(git log --oneline -1)"

            # Recreate .env
            cat > .env << EOF
            MONGO_URI_USERS=${{ secrets.MONGO_URI_USERS }}
            MONGO_URI_RESTAURANT=${{ secrets.MONGO_URI_RESTAURANT }}
            MONGO_URI_ORDERS=${{ secrets.MONGO_URI_ORDERS }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            RABBITMQ_URL=${{ secrets.RABBITMQ_URL }}
            EOF

            # Stop containers first
            docker compose down --remove-orphans

            # Prune AFTER containers stopped and BEFORE build
            # Use --volumes=false to protect networks
            docker container prune -f
            docker image prune -f

            # Build and start
            docker compose build
            docker compose up -d

            sleep 15
            docker compose ps
            echo "✅ Done at $(date)"
            echo "🌐 http://${{ secrets.EC2_HOST }}"