name: Full CI/CD - Build & Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: CI - Build Docker images
        run: docker compose build --no-cache

      - name: CD - Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 300s
          script: |
            echo "🚀 Full CI/CD Deployment started at $(date)"
            cd ~/food-ordering-app
            git fetch origin
            git reset --hard origin/main
            echo "Stopping old containers..."
            docker compose down
            echo "Building and starting new containers..."
            docker compose up -d --build
            echo "✅ Deployment completed at $(date)"
            echo "📊 Container status:"
            docker compose ps
            echo "🌐 Application URL: http://13.60.68.37"
            echo "🐰 RabbitMQ: http://13.60.68.37:15672"
