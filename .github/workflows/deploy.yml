name: CI/CD - Build and Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: CI - Validate Docker Compose file
        run: |
          cat > .env << EOF
          MONGO_URI_USERS=mongodb://localhost/users_db
          MONGO_URI_RESTAURANT=mongodb://localhost/restaurant_db
          MONGO_URI_ORDERS=mongodb://localhost/orders_db
          JWT_SECRET=dummy-for-validation
          RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
          EOF
          docker compose config
          echo "✅ Docker Compose config is valid"

      - name: CD - Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 600s
          script: |
            echo "🚀 Deployment started at $(date)"
            cd ~/food-ordering-app

            git fetch origin main
            git reset --hard origin/main
            echo "📌 Commit: $(git log --oneline -1)"

            # Create root .env for docker compose
            cat > .env << EOF
            MONGO_URI_USERS=${{ secrets.MONGO_URI_USERS }}
            MONGO_URI_RESTAURANT=${{ secrets.MONGO_URI_RESTAURANT }}
            MONGO_URI_ORDERS=${{ secrets.MONGO_URI_ORDERS }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            RABBITMQ_URL=${{ secrets.RABBITMQ_URL }}
            EOF

            echo "✅ .env created"

            docker compose down --remove-orphans
            docker image prune -f
            docker compose build --no-cache
            docker compose up -d

            echo "⏳ Waiting for services..."
            sleep 20

            docker compose ps
            echo "✅ Deployment done at $(date)"
            echo "🌐 Live at: http://16.170.217.98"