name: CI/CD Pipeline for Food Ordering App

on:
  push:
    branches: [ main ]

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: CI - Build Docker Images
        run: docker compose build --no-cache

      - name: CD - Deploy to AWS EC2 (Manual Triggered)
        run: |
          echo "✅ CI Build completed successfully"
          echo "📋 Deployment to AWS EC2 (IP: 13.60.68.37) is done manually"
          echo "The application is running at http://13.60.68.37"
          echo "RabbitMQ: http://13.60.68.37:15672"
          echo "This pipeline demonstrates CI/CD setup using GitHub Actions"
