services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: foodordering-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: foodordering-user-service
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      MONGO_URI: ${MONGO_URI_USERS}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped

  restaurant-service:
    build: ./restaurant-service
    container_name: foodordering-restaurant-service
    ports:
      - "3002:3000"
    environment:
      PORT: 3000
      MONGO_URI: ${MONGO_URI_RESTAURANT}
      JWT_SECRET: ${JWT_SECRET}
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: foodordering-order-service
    ports:
      - "3003:3000"
    environment:
      PORT: 3000
      MONGO_URI: ${MONGO_URI_ORDERS}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      USER_SERVICE_URL: http://user-service:3000
      RESTAURANT_SERVICE_URL: http://restaurant-service:3000
    depends_on:
      - rabbitmq
      - user-service
      - restaurant-service
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    container_name: foodordering-notification-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: foodordering-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_USER_SERVICE_URL: http://localhost/api/auth
      REACT_APP_RESTAURANT_SERVICE_URL: http://localhost/api/restaurant
      REACT_APP_ORDER_SERVICE_URL: http://localhost/api/orders
    depends_on:
      - user-service
      - restaurant-service
      - order-service
    restart: unless-stopped

  api-gateway:
    image: nginx:alpine
    container_name: foodordering-api-gateway
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - user-service
      - restaurant-service
      - order-service
      - notification-service
    restart: unless-stopped
