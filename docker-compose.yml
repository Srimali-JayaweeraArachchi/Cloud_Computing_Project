version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: foodordering-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  api-gateway:
    image: nginx:alpine
    container_name: foodordering-api-gateway
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - restaurant-service
      - order-service
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: foodordering-user-service
    ports:
      - "8001:3000"
    environment:
      - MONGO_URI_USERS=${MONGO_URI_USERS}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  restaurant-service:
    build: ./restaurant-service
    container_name: foodordering-restaurant-service
    ports:
      - "8002:3000"
    environment:
      - MONGO_URI_RESTAURANT=${MONGO_URI_RESTAURANT}
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: foodordering-order-service
    ports:
      - "8003:3000"
    environment:
      - MONGO_URI_ORDERS=${MONGO_URI_ORDERS}
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    container_name: foodordering-notification-service
    ports:
      - "8004:3000"
    environment:
      - MONGO_URI_ORDERS=${MONGO_URI_ORDERS}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - rabbitmq
    restart: unless-stopped
