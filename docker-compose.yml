services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: foodordering-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: foodordering-user-service
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      MONGO_URI: ${MONGO_URI_USERS}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    restart: unless-stopped

  restaurant-service:
    build: ./restaurant-service
    container_name: foodordering-restaurant-service
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      MONGO_URI: ${MONGO_URI_RESTAURANT}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: foodordering-order-service
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      MONGO_URI: ${MONGO_URI_ORDERS}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      USER_SERVICE_URL: http://user-service:8001
      RESTAURANT_SERVICE_URL: http://restaurant-service:8002
      NODE_ENV: production
    depends_on:
      - rabbitmq
      - user-service
      - restaurant-service
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    container_name: foodordering-notification-service
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      RABBITMQ_URL: ${RABBITMQ_URL}
      NODE_ENV: production
    depends_on:
      - rabbitmq
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: foodordering-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_USER_SERVICE_URL: http://api-gateway/api/auth
      REACT_APP_RESTAURANT_SERVICE_URL: http://api-gateway/api/restaurant
      REACT_APP_ORDER_SERVICE_URL: http://api-gateway/api/orders
    depends_on:
      - user-service
      - restaurant-service
      - order-service
    restart: unless-stopped

  api-gateway:
    image: nginx:alpine
    container_name: foodordering-api-gateway
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - user-service
      - restaurant-service
      - order-service
      - notification-service
    restart: unless-stopped