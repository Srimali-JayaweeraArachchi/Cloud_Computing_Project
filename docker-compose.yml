version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: foodordering-mongodb
    environment:
      MONGO_INITDB_DATABASE: foodordering
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # RabbitMQ for async communication (Notification service)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: foodordering-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  # API Gateway using Nginx
  api-gateway:
    image: nginx:alpine
    container_name: foodordering-api-gateway
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - restaurant-service
      - order-service
    restart: unless-stopped

  # User Service (Auth)
  user-service:
    build: ./user-service
    container_name: foodordering-user-service
    ports:
      - "3001:3000"          # Host port 3001 → container port 3000
    environment:
      - MONGO_URI=mongodb://mongodb:27017/foodordering
      - JWT_SECRET=supersecretkeyforfoodapp123456789
    depends_on:
      - mongodb
    restart: unless-stopped

  # Restaurant Service
  restaurant-service:
    build: ./restaurant-service
    container_name: foodordering-restaurant-service
    ports:
      - "3002:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/foodordering
    depends_on:
      - mongodb
    restart: unless-stopped

  # Order Service
  order-service:
    build: ./order-service
    container_name: foodordering-order-service
    ports:
      - "3003:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/foodordering
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - mongodb
      - rabbitmq
    restart: unless-stopped

  # Notification Service (async)
  notification-service:
    build: ./notification-service
    container_name: foodordering-notification-service
    environment:
      - MONGO_URI=mongodb://mongodb:27017/foodordering
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - mongodb
      - rabbitmq
    restart: unless-stopped

volumes:
  mongodb_data: