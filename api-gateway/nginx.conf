events {}

http {
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        # Frontend
        location / {
            set $upstream_frontend frontend;
            proxy_pass http://$upstream_frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # User / Auth API
        location /api/auth/ {
            set $upstream_user user-service;
            proxy_pass http://$upstream_user:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Restaurant API
        location /api/restaurant/ {
            set $upstream_restaurant restaurant-service;
            proxy_pass http://$upstream_restaurant:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Order API
        location /api/orders/ {
            set $upstream_order order-service;
            proxy_pass http://$upstream_order:8003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Notification API
        location /api/notifications/ {
            set $upstream_notification notification-service;
            proxy_pass http://$upstream_notification:8004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}