events {}

http {
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        location /api/auth/ {
            set $upstream_user user-service;
            proxy_pass http://$upstream_user:3000/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/restaurant/ {
            set $upstream_restaurant restaurant-service;
            proxy_pass http://$upstream_restaurant:3000/api/restaurant/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/orders/ {
            set $upstream_order order-service;
            proxy_pass http://$upstream_order:3000/api/orders/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/notification/ {
            set $upstream_notification notification-service;
            proxy_pass http://$upstream_notification:3004/api/notification/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            set $upstream_frontend frontend;
            proxy_pass http://$upstream_frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
