events {
    worker_processes auto;
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s;

    # Load balancing upstream groups (least_conn algorithm)
    # Scale by adding more server lines without changing anything else
    upstream user_service {
        least_conn;
        server user-service:8001;
        keepalive 32;
    }

    upstream restaurant_service {
        least_conn;
        server restaurant-service:8002;
        keepalive 32;
    }

    upstream order_service {
        least_conn;
        server order-service:8003;
        keepalive 32;
    }

    upstream notification_service {
        least_conn;
        server notification-service:8004;
        keepalive 32;
    }

    server {
        listen 80;

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # User / Auth API
        location /api/auth/ {
            proxy_pass http://user_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Restaurant API
        location /api/restaurant/ {
            proxy_pass http://restaurant_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Order API
        location /api/orders/ {
            proxy_pass http://order_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Notification API
        location /api/notifications/ {
            proxy_pass http://notification_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Health check endpoint
        location /health {
            return 200 '{"status":"healthy","gateway":"food-ordering-api"}';
            add_header Content-Type application/json;
        }
    }
}