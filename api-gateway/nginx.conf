events {}

http {
    # Important: Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        # API routes with variable to allow dynamic resolution
        location /api/user/ {
            set $upstream_user user-service;
            proxy_pass http://$upstream_user:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/restaurant/ {
            set $upstream_restaurant restaurant-service;
            proxy_pass http://$upstream_restaurant:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/order/ {
            set $upstream_order order-service;
            proxy_pass http://$upstream_order:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Root route for health check
        location / {
            return 200 "Food Ordering API Gateway is running!\n";
            add_header Content-Type text/plain;
        }
    }
}