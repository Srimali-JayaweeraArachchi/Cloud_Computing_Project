events {}

http {
    upstream user_service     { server user-service:8001; }
    upstream restaurant_service { server restaurant-service:8002; }
    upstream order_service    { server order-service:8003; }

    server {
        listen 80;

        location /api/auth/ {
            proxy_pass http://user_service/;
        }

        location /api/restaurants/ {
            proxy_pass http://restaurant_service/;
        }

        location /api/orders/ {
            proxy_pass http://order_service/;
        }

        # Frontend will be served from / (React build later)
    }
}