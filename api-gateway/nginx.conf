events {}

http {
    server {
        listen 80;

        # API Gateway routes - all services accessible under /api/
        location /api/user/ {
            proxy_pass http://user-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/restaurant/ {
            proxy_pass http://restaurant-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/order/ {
            proxy_pass http://order-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check or root route (optional)
        location / {
            return 200 "API Gateway is running!\n";
            add_header Content-Type text/plain;
        }
    }
}